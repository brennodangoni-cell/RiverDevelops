<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sora Watermark Remover 🎬</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #0a0a0a;
            --accent: #06b6d4;
            --text: #ffffff;
            --text-dim: #71717a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-center: center;
            min-height: 100-vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px;
            width: 90%;
            margin: auto;
            text-align: center;
            padding: 40px 20px;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .input-group {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 8px;
            display: flex;
            gap: 8px;
            transition: all 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }

        input {
            background: transparent;
            border: none;
            color: white;
            padding: 12px 16px;
            flex: 1;
            font-family: inherit;
            outline: none;
        }

        button {
            background: var(--accent);
            color: black;
            border: none;
            border-radius: 14px;
            padding: 12px 24px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #22d3ee;
            transform: translateY(-1px);
        }

        button:disabled {
            background: #27272a;
            cursor: not-allowed;
            color: #52525b;
        }

        .loader {
            display: none;
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(6, 182, 212, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #result {
            margin-top: 32px;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
        }

        .download-btn {
            background: white;
            color: black;
            text-decoration: none;
            display: inline-block;
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .download-btn:hover {
            background: #f4f4f5;
            transform: scale(1.05);
        }

        .badge {
            background: rgba(6, 182, 212, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 16px;
            display: inline-block;
        }

        .glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="glow"></div>
    <div class="container">
        <div class="card">
            <div class="badge">Local Engine v1.1</div>
            <h1>Sora Remover</h1>
            <p>Cole o link direto do vídeo (.mp4) para começar.</p>

            <div class="input-group">
                <input type="text" id="videoUrl" placeholder="https://cdn.sora.openai.com/video.mp4">
                <button id="btnProcess" onclick="processVideo()">Remover</button>
            </div>

            <div class="loader" id="loader"></div>

            <div id="result">
                <p style="margin-bottom: 16px; font-weight: 600; color: white;">🎉 Vídeo Limpo com Sucesso!</p>
                <a href="#" id="downloadLink" download class="download-btn">Baixar Agora</a>
            </div>
        </div>
        <p style="margin-top: 24px; font-size: 0.7rem; color: #333;">Ryzen 5 5600GT Optimization Active | v1.1</p>
    </div>

    <script>
        async function processVideo() {
            const urlInput = document.getElementById('videoUrl');
            const url = urlInput.value.trim();
            const btn = document.getElementById('btnProcess');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');

            if (!url) return alert('Por favor, cole um link válido!');

            btn.disabled = true;
            loader.style.display = 'block';
            result.style.display = 'none';

            try {
                console.log('Solicitando remoção para:', url);
                const response = await fetch('http://localhost:3006/api/remove-watermark', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ videoUrl: url })
                });

                const data = await response.json();

                if (response.ok && data.downloadUrl) {
                    document.getElementById('downloadLink').href = data.downloadUrl;
                    result.style.display = 'block';
                } else {
                    alert('Erro do Servidor: ' + (data.error || 'Erro desconhecido.'));
                }
            } catch (error) {
                console.error('Falha de rede:', error);
                alert('Servidor Local OFF. Certifique-se de que o terminal está rodando.');
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }
    </script>
</body>

</html>
